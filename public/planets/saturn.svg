      <feTurbulence type="fractalNoise" baseFrequency=".016 .11" numOctaves="4" seed="64"/>
      <feColorMatrix type="saturate" values=".18"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="saturnBase" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(795 328) rotate(50) scale(520)">
