      <stop offset=".11" stop-color="white" stop-opacity=".5"/>
      <stop offset=".37" stop-color="white" stop-opacity=".05"/>
      <stop offset=".7" stop-color="#020102" stop-opacity=".2"/>
      <stop offset="1" stop-color="#010101" stop-opacity=".94"/>
